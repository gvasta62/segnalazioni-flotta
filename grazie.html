<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Segnalazione inviata</title>
<style>
  :root{--fs-red:#a3173b;--fs-red-dark:#7d0f2c;--ink:#1f2430;--muted:#6b7280;--bg:#f4f5f7}
  body{font-family:-apple-system,Segoe UI,Roboto,Arial,sans-serif;margin:0;background:var(--bg);
       color:var(--ink);display:flex;min-height:100vh;align-items:center;justify-content:center;padding:20px}
  .card{background:#fff;border-radius:16px;padding:34px 26px;max-width:440px;text-align:center;
        box-shadow:0 6px 24px rgba(0,0,0,.08)}
  .ok{width:74px;height:74px;border-radius:50%;background:#e9f7ee;color:#1e8e4e;
      font-size:40px;line-height:74px;margin:0 auto 16px}
  h1{font-size:22px;margin:0 0 8px;color:var(--fs-red-dark)}
  p{color:var(--muted);line-height:1.55;margin:8px 0}
  a.btn{display:inline-block;margin-top:20px;padding:14px 22px;background:var(--fs-red);
        color:#fff;text-decoration:none;border-radius:12px;font-weight:700}
</style>
</head>
<body>
  <div class="card">
    <div class="ok">✓</div>
    <h1>Segnalazione inviata</h1>
    <p>Grazie! La tua segnalazione è stata trasmessa correttamente.</p>
    <p>Una copia di riepilogo è stata inviata alla tua email.</p>
    <a class="btn" href="index.html">Nuova segnalazione</a>
  </div>
</body>
</html>
